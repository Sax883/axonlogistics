<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.95"/>
  
  <!-- Main truck/logistics icon -->
  <g transform="translate(50, 70)">
    <!-- Truck body -->
    <rect x="10" y="20" width="50" height="30" rx="4" fill="white" stroke="#1e40af" stroke-width="2"/>
    <!-- Truck cabin -->
    <rect x="0" y="20" width="15" height="30" rx="3" fill="white" stroke="#1e40af" stroke-width="2"/>
    <!-- Truck window -->
    <rect x="2" y="23" width="11" height="10" rx="2" fill="#e0f2fe"/>
    <!-- Left wheel -->
    <circle cx="8" cy="55" r="5" fill="#1e40af"/>
    <circle cx="8" cy="55" r="3" fill="#0284c7"/>
    <!-- Right wheel -->
    <circle cx="55" cy="55" r="5" fill="#1e40af"/>
    <circle cx="55" cy="55" r="3" fill="#0284c7"/>
  </g>
  
  <!-- Package icon -->
  <g transform="translate(100, 65)">
    <rect x="0" y="0" width="35" height="35" rx="3" fill="white" stroke="#1e40af" stroke-width="2" opacity="0.9"/>
    <line x1="0" y1="12" x2="35" y2="12" stroke="#1e40af" stroke-width="1.5" opacity="0.6"/>
    <line x1="17.5" y1="0" x2="17.5" y2="35" stroke="#1e40af" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Checkmark for delivery -->
  <g transform="translate(110, 85)">
    <circle cx="10" cy="10" r="12" fill="#10b981" opacity="0.9"/>
    <polyline points="5,10 9,14 16,7" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text below -->
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1e40af">
    AXON
  </text>
  <text x="100" y="168" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#0284c7" letter-spacing="1">
    LOGISTICS
  </text>
</svg>